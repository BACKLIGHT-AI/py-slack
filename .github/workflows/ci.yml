name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -v
